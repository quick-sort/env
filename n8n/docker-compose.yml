version: '3.8'

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password  # Change this to a secure password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=false
    volumes:
      - data:/root/.n8n
    depends_on:
      - postgres
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: n8n-mcp
    restart: unless-stopped
    
    # Environment configuration
    environment:
      # Mode configuration
      MCP_MODE: http
      # NOTE: USE_FIXED_HTTP is deprecated. SingleSessionHTTPServer is now the default.
      # See: https://github.com/czlonkowski/n8n-mcp/issues/524
      AUTH_TOKEN: 'auth_token'
      
      # Application settings
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3000
      
      # Database
      NODE_DB_PATH: /app/data/nodes.db
      REBUILD_ON_START: ${REBUILD_ON_START:-false}

      # Telemetry: Anonymous usage statistics are ENABLED by default
      # To opt-out, uncomment and set to 'true':
      N8N_MCP_TELEMETRY_DISABLED: false

      # Optional: n8n API configuration (enables 16 additional management tools)
      # Uncomment and configure to enable n8n workflow management
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ''
      # N8N_API_TIMEOUT: ${N8N_API_TIMEOUT:-30000}
      # N8N_API_MAX_RETRIES: ${N8N_API_MAX_RETRIES:-3}
    
    # Volumes for persistence
    volumes:
      - mcp-data:/app/data
    
    # Port mapping
    ports:
      - "5679:3000"
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:$${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:alpine
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password  # Match the password above
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  data:
  mcp-data:
  postgres_data:
